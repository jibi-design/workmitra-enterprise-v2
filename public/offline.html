<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>WorkMitra — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 320px; }
    .icon {
      width: 72px; height: 72px; margin: 0 auto 20px;
      border-radius: 18px;
      background: rgba(29,78,216,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { display: block; }
    h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 20px; }
    .retry {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px; border-radius: 12px; border: none;
      background: #1d4ed8; color: #fff;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .retry:hover { background: #1e40af; }
    .hint { margin-top: 16px; font-size: 11px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24">
        <path fill="#1d4ed8" d="M24 .01c0-.01 0-.01 0 0L0 11l9 4 2 8 4.99-5.01 5.02 4.01L24 .01ZM9.69 13.69 2.49 11 19.78 4.02 9.69 13.69ZM12.95 20l-1.86-5.84L21.22 4.4 12.95 20Z"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>WorkMitra needs an internet connection. Please check your network and try again.</p>
    <button class="retry" onclick="window.location.reload()">
      Try again
    </button>
    <div class="hint">Your data is safely stored on this device.</div>
  </div>
</body>
</html>
